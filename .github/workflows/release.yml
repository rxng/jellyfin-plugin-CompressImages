name: Build and Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set version in project
        run: |
          sed -i "s|<Version>.*</Version>|<Version>${{ steps.version.outputs.version }}</Version>|" Directory.Build.props
          sed -i "s|<AssemblyVersion>.*</AssemblyVersion>|<AssemblyVersion>${{ steps.version.outputs.version }}</AssemblyVersion>|" Directory.Build.props
          sed -i "s|<FileVersion>.*</FileVersion>|<FileVersion>${{ steps.version.outputs.version }}</FileVersion>|" Directory.Build.props
          sed -i "s|^version:.*|version: \"${{ steps.version.outputs.version }}\"|" build.yaml

      - name: Build
        run: dotnet publish --configuration=Release Jellyfin.Plugin.CompressImages.sln

      - name: Create plugin zip
        run: |
          cd Jellyfin.Plugin.CompressImages/bin/Release/net9.0/publish
          zip -j "$GITHUB_WORKSPACE/compress-images-${{ github.ref_name }}.zip" Jellyfin.Plugin.CompressImages.dll

      - name: Compute checksum
        id: checksum
        run: echo "md5=$(md5sum compress-images-${{ github.ref_name }}.zip | awk '{print $1}')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: compress-images-${{ github.ref_name }}.zip
          generate_release_notes: true

      - name: Update manifest.json
        run: |
          jq --arg ver "${{ steps.version.outputs.version }}" \
             --arg url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/compress-images-${{ github.ref_name }}.zip" \
             --arg md5 "${{ steps.checksum.outputs.md5 }}" \
             --arg ts "$(date -u +%Y-%m-%dT%H:%M:%SZ)" \
             '.[0].versions = [{"version": $ver, "changelog": ("Release " + $ver), "targetAbi": "10.11.0.0", "sourceUrl": $url, "checksum": $md5, "timestamp": $ts}] + [.[0].versions[] | select(.version != $ver)]' \
             manifest.json > manifest.tmp && mv manifest.tmp manifest.json

      - name: Commit updated manifest
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.json
          git commit -m "Update manifest.json for ${{ github.ref_name }}" || true
          git push origin master